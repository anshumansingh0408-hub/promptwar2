<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ElectionGuide{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Sora:wght@600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Sora', 'sans-serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    },
                    colors: {
                        ink: '#0D1117',
                        paper: '#F5F0E8',
                        vote: '#1A56DB',
                        accent: '#E8A317',
                        muted: '#6B7280',
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <style>
        body {
            background-color: theme('colors.paper');
            /* Subtle paper-grain texture */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }

        /* Chat Bubble Markdown Formatting */
        .chat-bubble p { margin-bottom: 0.75rem; }
        .chat-bubble p:last-child { margin-bottom: 0; }
        .chat-bubble ol { list-style-type: decimal; margin-left: 1.25rem; margin-bottom: 0.75rem; }
        .chat-bubble ul { list-style-type: disc; margin-left: 1.25rem; margin-bottom: 0.75rem; }
        .chat-bubble li { margin-bottom: 0.25rem; }
        .chat-bubble strong { font-weight: 700; color: inherit; }

        /* Fade-up Entrance Animation */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
            animation: fadeUp 0.3s ease-out forwards;
        }

        /* 3-Dot Typing Indicator Bounce */
        @keyframes bounceDelay {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 0;
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: currentColor;
            border-radius: 50%;
            display: inline-block;
            animation: bounceDelay 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="font-body text-ink min-h-screen flex flex-col antialiased">
    <a href="#main-content" class="sr-only focus:not-sr-only">Skip to main content</a>

    <!-- Sticky Navigation Bar -->
    <header role="banner" class="sticky top-0 z-50 bg-paper/90 backdrop-blur-md border-b border-muted/20 shadow-sm">
        <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
            
            <!-- Logo & Title -->
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-vote rounded flex items-center justify-center text-white shrink-0 shadow-sm">
                    <!-- Clipboard/Ballot SVG -->
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <div>
                    <h1 class="font-display font-bold text-lg leading-none tracking-tight">ElectionGuide</h1>
                    <p class="text-[10px] sm:text-xs text-muted mt-1 uppercase tracking-wider font-medium">Neutral &middot; Non-partisan &middot; Educational</p>
                </div>
            </div>

            <!-- Links & Badge -->
            <div class="flex items-center gap-4">
                <a href="/timeline" class="text-xs font-semibold text-vote hover:underline focus:outline-none focus:ring-2 focus:ring-vote rounded px-1">
                    📅 View Full Timeline
                </a>
                <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-accent/15 text-accent border border-accent/20">
                    🗳 Civics AI
                </span>
            </div>
            
        </div>
    </header>

    <!-- Main Content Area -->
    <main role="main" id="main-content" class="flex-grow w-full max-w-3xl mx-auto px-4 py-6 flex flex-col">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
